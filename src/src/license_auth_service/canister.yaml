# yaml-language-server: $schema=https://github.com/dfinity/icp-cli/raw/refs/heads/main/docs/schemas/canister-yaml-schema.json
name: license_auth_service
build:
  steps:
    - type: script
      commands:
        - $MOC_PATH --implicit-package core --default-persistent-actors -no-check-ir -E M0236 -E M0235 -E M0223 -E M0237 --package base $MOTOKO_BASE --package core $MOTOKO_CORE main.mo -o license_auth_service.wasm
        - mv license_auth_service.wasm "$ICP_WASM_OUTPUT_PATH"
